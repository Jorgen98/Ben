services:
  ben-proxy-server:
    container_name: ben-proxy-server
    image: nginx:1.19
    depends_on:
      ben-db-postgis:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - ben-network
  ben-be-fetch:
    container_name: ben-be-fetch
    build:
      context: ./backend
    command: node be-fetch.js
    depends_on:
      ben-db-postgis:
        condition: service_healthy
    environment:
      TZ: "Europe/Bratislava"
    env_file:
      - ./env/.env
    deploy:
      restart_policy:
        condition: on-failure
        delay: 3s
        max_attempts: 3
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    networks:
      - ben-network
  ben-be-api:
    container_name: ben-be-api
    build:
      context: ./backend
    command: node be-api.js
    depends_on:
      ben-db-postgis:
        condition: service_healthy
    environment:
      TZ: "Europe/Bratislava"
    env_file:
      - ./env/.env
    deploy:
      restart_policy:
        condition: on-failure
        delay: 3s
        max_attempts: 3
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    networks:
      - ben-network
  ben-redis:
    container_name: ben-redis
    image: redis:7
    environment:
      TZ: "Europe/Bratislava"
    env_file:
      - ./env/.env
    depends_on:
      ben-db-postgis:
        condition: service_healthy
    networks:
      - ben-network
  ben-db-postgis:
    container_name: ben-db-postgis
    image: postgis/postgis:16-master
    volumes:
      - ./env/db-postgis-init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db-postgis-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_POSTGIS_USER}
      POSTGRES_PASSWORD: ${DB_POSTGIS_PASSWORD}
      POSTGRES_DB: ${DB_POSTGIS_DATABASE}
      PGPORT: 5432
      PGUSER: ${DB_POSTGIS_USER}
      TZ: "Europe/Bratislava"
    deploy:
      restart_policy:
        condition: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_POSTGIS_DATABASE} -U ${DB_POSTGIS_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ben-network
networks:
  ben-network:
    name: ben-network
