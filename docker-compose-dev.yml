services:
  ben-db-postgres:
    container_name: ben-db-postgres
    image: postgres:13
    volumes:
      - ./env/db-postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db-postgres-data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_POSTGRES_DATABASE}
      PGPORT: 5432
      PGUSER: ${DB_POSTGRES_USER}
      TZ: "Europe/Bratislava"
    deploy:
      restart_policy:
        condition: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_POSTGRES_DATABASE} -U ${DB_POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
