events {}

http {
    resolver 127.0.0.11 valid=30s;
    include mime.types;

    server {
        listen 80;

        include /etc/nginx/mime.types;

        root   /home/;

        location /ben {
            set $api http://ben-be-api:7001;
            proxy_pass $api$uri$is_args$args;
        }
    }
}
